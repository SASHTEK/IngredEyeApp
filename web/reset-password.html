<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - IngredEye</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      font-weight: bold;
      color: #2e7d32;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #555;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
      color: #333;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #2e7d32;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 17px;
      font-weight: bold;
      color: #fff;
      background: #2e7d32;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    button:hover {
      background: #256b29;
    }

    button:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }

    .error {
      color: #d32f2f;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }

    .success {
      color: #2e7d32;
      font-size: 15px;
      margin-top: 16px;
      display: none;
    }

    .open-app {
      display: none;
      margin-top: 24px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: bold;
      color: #2e7d32;
      background: #e8f5e9;
      border: 2px solid #2e7d32;
      border-radius: 15px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .open-app:hover {
      background: #c8e6c9;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Loading State -->
    <div id="loading-state">
      <div class="spinner"></div>
      <p class="loading-text" style="color: #555; margin-top: 16px;">Verifying your link...</p>
    </div>

    <!-- Error State -->
    <div id="error-state" style="display: none;">
      <h1>Oops!</h1>
      <p class="error" id="error-message" style="display: block; margin-top: 16px;"></p>
      <p style="color: #555; margin-top: 12px; font-size: 14px;">The reset link may have expired or is invalid.</p>
    </div>

    <!-- Form State -->
    <div id="form-state" style="display: none;">
      <h1>Set New Password</h1>
      <p class="subtitle">Enter your new password below</p>

      <input
        type="password"
        id="new-password"
        placeholder="New Password"
        autocomplete="new-password"
      />
      <input
        type="password"
        id="confirm-password"
        placeholder="Confirm Password"
        autocomplete="new-password"
      />

      <button id="update-btn" onclick="handleUpdatePassword()">Update Password</button>

      <p class="error" id="form-error"></p>
    </div>

    <!-- Success State -->
    <div id="success-state" style="display: none;">
      <h1>Password Updated!</h1>
      <p class="success" style="display: block; margin-top: 16px;">
        Your password has been successfully reset.
      </p>
      <a class="open-app" id="open-app-btn" href="#">Open IngredEye</a>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    
    // ============================================================
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    // ============================================================

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let accessToken = null;
    let refreshToken = null;

    // Show a specific state and hide others
    function showState(state) {
      document.getElementById('loading-state').style.display = state === 'loading' ? 'block' : 'none';
      document.getElementById('error-state').style.display = state === 'error' ? 'block' : 'none';
      document.getElementById('form-state').style.display = state === 'form' ? 'block' : 'none';
      document.getElementById('success-state').style.display = state === 'success' ? 'block' : 'none';
    }

    // Show error message
    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.style.display = 'block';
    }

    // Hide error message
    function hideError(elementId) {
      const el = document.getElementById(elementId);
      el.textContent = '';
      el.style.display = 'none';
    }

    // Extract tokens from URL hash
    function extractTokens() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);

      accessToken = params.get('access_token');
      refreshToken = params.get('refresh_token');

      return accessToken && refreshToken;
    }

    // Set session with extracted tokens
    async function initializeSession() {
      try {
        if (!extractTokens()) {
          showState('error');
          showError('error-message', 'Invalid or missing reset link parameters.');
          return;
        }

        const { error } = await db.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken,
        });

        if (error) {
          showState('error');
          showError('error-message', error.message || 'Failed to verify reset link.');
          return;
        }

        // Clean up URL
        window.history.replaceState({}, document.title, window.location.pathname);

        // Show password form
        showState('form');
      } catch (err) {
        showState('error');
        showError('error-message', 'An unexpected error occurred.');
      }
    }

    // Handle password update
    async function handleUpdatePassword() {
      hideError('form-error');

      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      // Validation
      if (!newPassword) {
        showError('form-error', 'Please enter a new password.');
        return;
      }

      if (newPassword.length < 6) {
        showError('form-error', 'Password must be at least 6 characters.');
        return;
      }

      if (newPassword !== confirmPassword) {
        showError('form-error', 'Passwords do not match.');
        return;
      }

      const btn = document.getElementById('update-btn');
      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const { error } = await db.auth.updateUser({
          password: newPassword,
        });

        if (error) {
          showError('form-error', error.message || 'Failed to update password.');
          btn.disabled = false;
          btn.textContent = 'Update Password';
          return;
        }

        // Success
        showState('success');

        // Set up "Open App" button
        const openAppBtn = document.getElementById('open-app-btn');
        openAppBtn.href = 'ingredeye://';
        openAppBtn.style.display = 'inline-block';
      } catch (err) {
        showError('form-error', 'An unexpected error occurred.');
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    }

    // Initialize on page load
    initializeSession();
  </script>
</body>
</html>
